spring.application.name=backend

# Configurações do PostgreSQL para Docker Compose
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Upload de imagens do portfólio
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
portfolio.upload.dir=/app/uploads/portfolio
portfolio.upload.url-prefix=http://localhost:8080/portfolio/imagens
ficha.upload.dir=/app/uploads/fichas
ficha.upload.url-prefix=${BACKEND_URL:http://localhost:8080}/ficha-tecnica/preview

# Z-API
zapi.enabled=${ZAPI_ENABLED:true}
zapi.base-url=${ZAPI_BASE_URL:https://api.z-api.io}
zapi.endpoint-url=${ZAPI_ENDPOINT_URL:}
zapi.instance-id=${ZAPI_INSTANCE_ID:3F405F78184AA23751B1B6659F1B412D}
zapi.instance-token=${ZAPI_INSTANCE_TOKEN:550DC98331FA33FC86140ADA}
zapi.client-token=${ZAPI_CLIENT_TOKEN:Fac62245d13034f6ea784922306ec80ceS}
zapi.empresa-whatsapp=${ZAPI_EMPRESA_WHATSAPP:5531984474124}
zapi.phone-field=${ZAPI_PHONE_FIELD:phone}
zapi.message-field=${ZAPI_MESSAGE_FIELD:message}
zapi.response-id-field=${ZAPI_RESPONSE_ID_FIELD:zaapId}
zapi.auth-header=${ZAPI_AUTH_HEADER:Client-Token}
zapi.connect-timeout-seconds=${ZAPI_CONNECT_TIMEOUT_SECONDS:5}
zapi.read-timeout-seconds=${ZAPI_READ_TIMEOUT_SECONDS:15}
