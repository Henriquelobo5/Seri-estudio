version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: postgres-seriestudio
    environment:
      POSTGRES_DB: seriestudio
      POSTGRES_USER: seriestudio
      POSTGRES_PASSWORD: seriestudio
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: backend-seriestudio
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/seriestudio
      SPRING_DATASOURCE_USERNAME: seriestudio
      SPRING_DATASOURCE_PASSWORD: seriestudio
      ZAPI_INSTANCE_ID: ${ZAPI_INSTANCE_ID:-3F405F78184AA23751B1B6659F1B412D}
      ZAPI_INSTANCE_TOKEN: ${ZAPI_INSTANCE_TOKEN:-550DC98331FA33FC86140ADA}
      ZAPI_CLIENT_TOKEN: ${ZAPI_CLIENT_TOKEN:-Fac62245d13034f6ea784922306ec80ceS}
      ZAPI_EMPRESA_WHATSAPP: ${ZAPI_EMPRESA_WHATSAPP:-5531984474124}
      TZ: America/Sao_Paulo
    ports:
      - "8080:8080"
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
